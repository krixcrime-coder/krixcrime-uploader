name: YouTube Auto Uploader

on:
  schedule:
    # These times are checked against config.json upload_times at runtime
    # GitHub Actions runs every hour; the script checks if it's time to upload
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_upload:
        description: 'Force upload even if not scheduled'
        required: false
        default: 'false'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --quiet --upgrade pip
          pip install google-auth google-auth-httplib2 google-api-python-client requests

      - name: Pull latest state before running
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions Bot"
          git pull origin main --rebase || true

      - name: Check if it's time to upload
        id: check_time
        run: |
          RESULT=$(python3 - <<'EOF'
          import json, datetime, sys

          try:
              with open('config.json') as f:
                  cfg = json.load(f)
          except Exception as e:
              print(f"ERROR reading config.json: {e}", file=sys.stderr)
              print("SHOULD_UPLOAD=false")
              sys.exit(0)

          now = datetime.datetime.utcnow()
          times = cfg.get('upload_times', [])
          force = "${{ github.event.inputs.force_upload }}" == "true"

          if force:
              print(f"Manual trigger with force=true")
              print("SHOULD_UPLOAD=true")
              sys.exit(0)

          for t in times:
              try:
                  hour, minute = map(int, t.split(':'))
                  scheduled = datetime.datetime(now.year, now.month, now.day, hour, minute)
                  diff_mins = abs((now - scheduled).total_seconds()) / 60
                  if diff_mins <= 30:
                      print(f"Time match: {t} (diff={diff_mins:.1f} min)")
                      print("SHOULD_UPLOAD=true")
                      sys.exit(0)
              except Exception as e:
                  print(f"Bad time format '{t}': {e}", file=sys.stderr)

          current_hhmm = now.strftime('%H:%M')
          print(f"No matching upload time for {current_hhmm} UTC (configured: {times})")
          print("SHOULD_UPLOAD=false")
          EOF
          )
          echo "$RESULT"
          echo "$RESULT" >> $GITHUB_OUTPUT

      - name: Run upload script
        if: contains(steps.check_time.outputs.SHOULD_UPLOAD, 'true') || github.event_name == 'workflow_dispatch'
        run: python3 scripts/main.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_NAME: ${{ github.repository }}

      - name: Upload summary
        if: always()
        run: |
          echo "### Upload Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (UTC):** $(date -u '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          if [ -f uploaded_log.json ]; then
            LAST=$(python3 -c "import json; log=json.load(open('uploaded_log.json')); e=log[-1] if log else {}; print(f'Status: {e.get(\"status\",\"N/A\")} | File: {e.get(\"file_name\",\"N/A\")} | YT: {e.get(\"youtube_url\",\"N/A\")}')" 2>/dev/null || echo "No log entry")
            echo "- **Last entry:** $LAST" >> $GITHUB_STEP_SUMMARY
          fi
